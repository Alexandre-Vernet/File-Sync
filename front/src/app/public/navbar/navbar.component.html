<div class="navigation">
    <ul>
        <li>
            <h2 class="name">{{user?.displayName}}</h2>
        </li>

        <!--Upload file-->
        <li [routerLink]="['/file/upload-file']" [routerLinkActive]="['active']">
            <b></b>
            <b></b>
            <a>
                <span class="icon">
                     <ion-icon name="cloud-upload-outline"></ion-icon>
                </span>
                <span class="title">Upload file</span>
            </a>
        </li>

        <!--List files-->
        <li [routerLink]="['/file/list-files']" [routerLinkActive]="['active']">
            <b></b>
            <b></b>
            <a>
                <span class="icon">
                     <ion-icon name="list-outline"></ion-icon>
                </span>
                <span class="title">List files</span>
            </a>
        </li>

        <!--Tabs-->
        <li [routerLink]="['/file/tabs']" [routerLinkActive]="['active']">
            <b></b>
            <b></b>
            <a>
                <span class="icon">
                     <ion-icon name="copy-outline"></ion-icon>
                </span>
                <span class="title">Tabs</span>
            </a>
        </li>

        <!--My profile-->
        <li [routerLink]="['/authentication/profile']" [routerLinkActive]="['active']">
            <b></b>
            <b></b>
            <a>
                <span class="icon">
                     <ion-icon name="person-circle-outline"></ion-icon>
                </span>
                <span class="title">My profile</span>
            </a>
        </li>

        <!--File size-->
        <li>
            <b></b>
            <b></b>
            <a>
                <span class="icon">
                     <ion-icon name="cloud-outline"></ion-icon>
                </span>
                <span class="title">{{ totalFilesSize }} / 5 GB</span>
            </a>
        </li>

        <!--Progress bar file size-->
        <li>
            <div class="progressBar">
                <mat-progress-bar
                        color="accent"
                        mode="determinate"
                        matTooltip="{{ progressBarValue }} %"
                        [value]="progressBarValue">
                </mat-progress-bar>
            </div>
        </li>

        <!--Dark theme-->
        <li (click)="onToggle()">
            <b></b>
            <b></b>
            <a>
                <span class="icon">
                     <ion-icon name="moon-outline"></ion-icon>
                </span>
                <span class="title">Dark theme</span>
            </a>
        </li>

        <!--Sign out-->
        <div class="sign-out" (click)="signOut()">
            <li>
                <b></b>
                <b></b>
                <a>
                <span class="icon">
                     <ion-icon name="log-out-outline"></ion-icon>
                </span>
                    <span class="title">Sign out</span>
                </a>
            </li>
        </div>
    </ul>
</div>
